name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install NuSMV 2.7.1
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libedit2 libxml2 xz-utils
          libedit_path="$(ldconfig -p | awk '/libedit\.so\.2/{print $NF; exit}')"
          test -n "$libedit_path"
          sudo ln -sf "$libedit_path" "$(dirname "$libedit_path")/libedit.so.0"
          curl -fsSLO https://nusmv.fbk.eu/distrib/2.7.1/NuSMV-2.7.1-linux64.tar.xz
          echo '894dc71f0997683f28d4dc3512e3a6b608e02b9700e5e813017931df2d11883c *NuSMV-2.7.1-linux64.tar.xz' | sha256sum -c -
          tar -xf NuSMV-2.7.1-linux64.tar.xz
          nusmv_bin="$(find "$PWD" -path '*/bin/NuSMV' -type f | head -n 1)"
          test -n "$nusmv_bin"
          chmod +x "$nusmv_bin"
          echo "$(dirname "$nusmv_bin")" >> "$GITHUB_PATH"
          echo "NUSMV_PATH=$nusmv_bin" >> "$GITHUB_ENV"

      - name: Run backend tests
        run: mvn test

  e2e:
    name: Full-stack E2E
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        # Docker Hub official mysql:8.0 multi-architecture manifest.
        image: mysql:8.0@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
        env:
          MYSQL_DATABASE: iot_verify
          MYSQL_USER: iot_verify
          MYSQL_PASSWORD: iot_verify_ci
          MYSQL_ROOT_PASSWORD: root_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot_ci --silent"
          --health-interval=10s --health-timeout=5s --health-retries=12
      redis:
        # Docker Hub official redis:7-alpine multi-architecture manifest.
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=12
    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/iot_verify?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      DB_USERNAME: iot_verify
      DB_PASSWORD: iot_verify_ci
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET: ci-only-jwt-secret-must-be-at-least-256-bits-long
      IOT_VERIFY_OPENAI_API_KEY: sk-ci-unused
      SERVER_PORT: 8080
      NUSMV_MAX_CONCURRENT: 1
      E2E_API_BASE_URL: http://127.0.0.1:8080
      PLAYWRIGHT_HTML_OPEN: never
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NuSMV 2.7.1
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libedit2 libxml2 xz-utils
          libedit_path="$(ldconfig -p | awk '/libedit\.so\.2/{print $NF; exit}')"
          test -n "$libedit_path"
          sudo ln -sf "$libedit_path" "$(dirname "$libedit_path")/libedit.so.0"
          curl -fsSLO https://nusmv.fbk.eu/distrib/2.7.1/NuSMV-2.7.1-linux64.tar.xz
          echo '894dc71f0997683f28d4dc3512e3a6b608e02b9700e5e813017931df2d11883c *NuSMV-2.7.1-linux64.tar.xz' | sha256sum -c -
          tar -xf NuSMV-2.7.1-linux64.tar.xz
          nusmv_bin="$(find "$PWD" -path '*/bin/NuSMV' -type f | head -n 1)"
          test -n "$nusmv_bin"
          chmod +x "$nusmv_bin"
          echo "$(dirname "$nusmv_bin")" >> "$GITHUB_PATH"
          echo "NUSMV_PATH=$nusmv_bin" >> "$GITHUB_ENV"

      - name: Build backend
        working-directory: backend
        run: mvn -q -DskipTests package

      - name: Install frontend and Chromium
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run full-stack E2E suite
        shell: bash
        run: |
          set -euo pipefail
          jar="$(find backend/target -maxdepth 1 -name '*.jar' -type f | head -n 1)"
          test -n "$jar"
          java -jar "$jar" >"$RUNNER_TEMP/backend-e2e.log" 2>&1 &
          backend_pid=$!
          trap 'kill "$backend_pid" 2>/dev/null || true' EXIT

          status=000
          for attempt in $(seq 1 60); do
            kill -0 "$backend_pid" || { cat "$RUNNER_TEMP/backend-e2e.log"; exit 1; }
            status="$(curl -s -o "$RUNNER_TEMP/readiness.json" -w '%{http_code}' \
              -H 'Content-Type: application/json' \
              -d '{"identifier":"ci-readiness-user","password":"Pass1234"}' \
              http://127.0.0.1:8080/api/auth/login || true)"
            [ "$status" = 401 ] && break
            sleep 2
          done
          [ "$status" = 401 ] || { cat "$RUNNER_TEMP/backend-e2e.log"; exit 1; }

          cd frontend
          npx playwright test \
            --project=chromium --workers=1 --retries=1 \
            --fail-on-flaky-tests --forbid-only --global-timeout=900000 \
            --trace=retain-on-failure-and-retries --reporter=line,html

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: full-stack-e2e-diagnostics
          if-no-files-found: ignore
          retention-days: 7
          path: |
            ${{ runner.temp }}/backend-e2e.log
            frontend/playwright-report/
            frontend/test-results/
