spring:
  application:
    name: iot-verify

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/iot_verify?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:sharkdingo123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never

iot-verify:
  http:
    max-request-bytes: ${IOT_VERIFY_MAX_REQUEST_BYTES:4194304}
    max-scene-request-bytes: ${IOT_VERIFY_MAX_SCENE_REQUEST_BYTES:67108864}
  ai:
    session-state-cleanup-ms: ${AI_SESSION_STATE_CLEANUP_MS:60000}

security:
  auth-rate-limit:
    login-per-minute: ${AUTH_LOGIN_RATE_LIMIT_PER_MINUTE:10}
    register-per-hour: ${AUTH_REGISTER_RATE_LIMIT_PER_HOUR:5}
    source-login-per-minute: ${AUTH_SOURCE_LOGIN_RATE_LIMIT_PER_MINUTE:120}
    source-register-per-hour: ${AUTH_SOURCE_REGISTER_RATE_LIMIT_PER_HOUR:60}
  operation-admission:
    lease-heartbeat-ms: ${OPERATION_ADMISSION_LEASE_HEARTBEAT_MS:30000}

llm:
  provider: ${LLM_PROVIDER:openai}
  api-key: ${IOT_VERIFY_OPENAI_API_KEY:your_api_key_here}
  model: ${IOT_VERIFY_OPENAI_MODEL:gpt-5.5}
  recommendation-model: ${IOT_VERIFY_OPENAI_RECOMMENDATION_MODEL:}
  base-url: ${IOT_VERIFY_OPENAI_BASE_URL:https://api.openai.com/v1}
  timeout-minutes: ${LLM_TIMEOUT_MINUTES:5}

chat:
  sse-timeout-ms: ${CHAT_SSE_TIMEOUT_MS:3600000}
  execution:
    max-tool-rounds: ${CHAT_MAX_TOOL_ROUNDS:64}
    max-stagnant-rounds: ${CHAT_MAX_STAGNANT_ROUNDS:2}
    lease-ttl-ms: ${CHAT_EXECUTION_LEASE_TTL_MS:30000}
    lease-heartbeat-ms: ${CHAT_EXECUTION_LEASE_HEARTBEAT_MS:10000}

jwt:
  secret: ${JWT_SECRET:iot-verify-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: ${REDIS_DATABASE:0}
  timeout: 3000ms
  lettuce:
    pool:
      max-active: 16
      max-idle: 8
      min-idle: 2
      max-wait: 2000ms

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176}

nusmv:
  path: ${NUSMV_PATH:D:/NuSMV/NuSMV-2.7.1-win64/NuSMV-2.7.1-win64/bin/NuSMV.exe}
  command-prefix: ${NUSMV_PREFIX:}
  timeout-ms: ${NUSMV_TIMEOUT_MS:120000}
  max-concurrent: ${NUSMV_MAX_CONCURRENT:6}
  acquire-permit-timeout-ms: ${NUSMV_ACQUIRE_PERMIT_TIMEOUT_MS:10000}
  max-output-bytes: ${NUSMV_MAX_OUTPUT_BYTES:4194304}
  temp-retention-hours: ${NUSMV_TEMP_RETENTION_HOURS:24}
  max-retained-temp-directories: ${NUSMV_MAX_RETAINED_TEMP_DIRECTORIES:200}
  temp-cleanup-ms: ${NUSMV_TEMP_CLEANUP_MS:300000}

fix:
  max-attempts: ${FIX_MAX_ATTEMPTS:20}
  max-candidates-per-rule: ${FIX_MAX_CANDIDATES_PER_RULE:5}
  max-refine-attempts: ${FIX_MAX_REFINE_ATTEMPTS:10}
  fix-timeout-ms: ${FIX_TIMEOUT_MS:300000}

device-template:
  schema-path: ${DEVICE_TEMPLATE_SCHEMA_PATH:device-template-schema.json}

fuzz:
  admission:
    max-active-tasks-per-user: ${FUZZ_MAX_ACTIVE_TASKS_PER_USER:2}
    max-stored-tasks-per-user: ${FUZZ_MAX_STORED_TASKS_PER_USER:100}

async-task-admission:
  verification:
    max-active-tasks-per-user: ${VERIFICATION_MAX_ACTIVE_TASKS_PER_USER:2}
    max-stored-tasks-per-user: ${VERIFICATION_MAX_STORED_TASKS_PER_USER:100}
  simulation:
    max-active-tasks-per-user: ${SIMULATION_MAX_ACTIVE_TASKS_PER_USER:2}
    max-stored-tasks-per-user: ${SIMULATION_MAX_STORED_TASKS_PER_USER:100}

thread-pool:
  interactive-ai:
    core-pool-size: ${THREAD_POOL_INTERACTIVE_AI_CORE:2}
    max-pool-size: ${THREAD_POOL_INTERACTIVE_AI_MAX:4}
    queue-capacity: ${THREAD_POOL_INTERACTIVE_AI_QUEUE:8}
    await-termination-seconds: ${THREAD_POOL_INTERACTIVE_AI_AWAIT:30}
  chat:
    core-pool-size: ${THREAD_POOL_CHAT_CORE:10}
    max-pool-size: ${THREAD_POOL_CHAT_MAX:50}
    queue-capacity: ${THREAD_POOL_CHAT_QUEUE:200}
    await-termination-seconds: ${THREAD_POOL_CHAT_AWAIT:30}
  verification-task:
    core-pool-size: ${THREAD_POOL_VERIFICATION_TASK_CORE:4}
    max-pool-size: ${THREAD_POOL_VERIFICATION_TASK_MAX:8}
    queue-capacity: ${THREAD_POOL_VERIFICATION_TASK_QUEUE:40}
    await-termination-seconds: ${THREAD_POOL_VERIFICATION_TASK_AWAIT:60}
  sync-verification:
    core-pool-size: ${THREAD_POOL_SYNC_VERIFICATION_CORE:4}
    max-pool-size: ${THREAD_POOL_SYNC_VERIFICATION_MAX:4}
    queue-capacity: ${THREAD_POOL_SYNC_VERIFICATION_QUEUE:16}
    await-termination-seconds: ${THREAD_POOL_SYNC_VERIFICATION_AWAIT:30}
  sync-simulation:
    core-pool-size: ${THREAD_POOL_SYNC_SIMULATION_CORE:4}
    max-pool-size: ${THREAD_POOL_SYNC_SIMULATION_MAX:4}
    queue-capacity: ${THREAD_POOL_SYNC_SIMULATION_QUEUE:16}
    await-termination-seconds: ${THREAD_POOL_SYNC_SIMULATION_AWAIT:30}
  simulation-task:
    core-pool-size: ${THREAD_POOL_SIMULATION_TASK_CORE:4}
    max-pool-size: ${THREAD_POOL_SIMULATION_TASK_MAX:8}
    queue-capacity: ${THREAD_POOL_SIMULATION_TASK_QUEUE:40}
    await-termination-seconds: ${THREAD_POOL_SIMULATION_TASK_AWAIT:60}
  fuzz-task:
    core-pool-size: ${THREAD_POOL_FUZZ_TASK_CORE:2}
    max-pool-size: ${THREAD_POOL_FUZZ_TASK_MAX:4}
    queue-capacity: ${THREAD_POOL_FUZZ_TASK_QUEUE:20}
    await-termination-seconds: ${THREAD_POOL_FUZZ_TASK_AWAIT:60}
